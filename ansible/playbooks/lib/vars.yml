nas_host: "{{ lookup('env', 'NAS_HOST') }}"
nas_pve_path: "{{ lookup('env', 'NAS_PVE_PATH') }}"
nas_pve_mount_point: "{{ lookup('env', 'NAS_PVE_MOUNT_POINT') }}"
nas_docker_path: "{{ lookup('env', 'NAS_DOCKER_PATH') }}"
nas_docker_mount_point: "{{ lookup('env', 'NAS_DOCKER_MOUNT_POINT') }}"
dns_host: "{{ lookup('env', 'DNS_HOST') }}"
vm_user_pass: "{{ lookup('env', 'VM_USER_PASS') }}"
ssh_public_key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_rsa.pub') }}"
dns_challenge_provider: "{{ lookup('env', 'DNS_CHALLENGE_PROVIDER') }}"
traefik_env: "{{ lookup('file', 'lib/traefik_env.yml') | from_yaml }}"
base_domain: "{{ lookup('env', 'BASE_DOMAIN') }}"
traefik_image: "{{ lookup('env', 'TRAEFIK_IMAGE') | default('traefik:v2.10.1', true) }}"
portainer_image: "{{ lookup('env', 'PORTAINER_IMAGE') | default('portainer/portainer-ce:2.18.3', true) }}"
portainer_agent_image: "{{ lookup('env', 'PORTAINER_AGENT_IMAGE') | default('portainer/agent:2.18.3', true) }}"
cloud_image_url: "{{ lookup('env', 'CLOUD_IMAGE_URL') | default('https://cloud-images.ubuntu.com/focal/current/focal-server-cloudimg-amd64.img', true) }}"
tz: "{{ lookup('env', 'TZ') | default('Europe/Amsterdam', true) }}"
